<!DOCTYPE html>
<html lang="en" data-theme="medieval">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browser RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="content" id="content"></div>
</div>

<div class="bottom-hud" id="bottomHud">
  <section class="bottom-hud-chat" aria-label="Chat">
    <div class="bottom-chat-head">Chat</div>
    <div class="bottom-chat-log" aria-live="polite">
      <p><strong>System:</strong> Welcome to the world.</p>
      <p><strong>Guide:</strong> Open Adventure to explore.</p>
    </div>
    <input class="bottom-chat-input" type="text" placeholder="Type a message..." aria-label="Chat message" disabled>
  </section>

  <section class="bottom-hud-center" aria-label="Character status">
    <img id="bottomHudPortrait" class="bottom-hud-portrait" src="Assets/Character/hero.svg" alt="Character portrait">
    <div class="bottom-hud-hp" aria-label="Health">
      <div class="bottom-hud-hp-fill" id="bottomHudHpFill"></div>
    </div>
    <div class="bottom-hud-meta"><span id="bottomHudName">Hero</span> · <span id="bottomHudHpText">100 / 100 HP</span></div>
  </section>

  <section class="bottom-hud-right">
    <div class="bottom-menu-row">
      <nav class="bottom-menu" aria-label="Main menu">
        <button type="button" id="characterPanelBtn" class="bottom-menu-btn" data-tooltip="Character" onclick="openCharacterPanel()">
          <img class="bottom-menu-icon" src="Assets/UI/character.png" alt="Character icon" onerror="this.onerror=null;this.src='Assets/UI/default-menu.png';">
          <span class="sr-only">Character</span>
        </button>
        <button type="button" class="bottom-menu-btn" data-page="adventure" data-tooltip="Adventure" onclick="navigate('adventure')">
          <img class="bottom-menu-icon" src="Assets/UI/adventure.png" alt="Adventure icon" onerror="this.onerror=null;this.src='Assets/UI/default-menu.png';">
          <span class="sr-only">Adventure</span>
        </button>
        <button type="button" class="bottom-menu-btn" data-page="arena" data-tooltip="Arena" onclick="navigate('arena')">
          <img class="bottom-menu-icon" src="Assets/UI/arena.png" alt="Arena icon" onerror="this.onerror=null;this.src='Assets/UI/default-menu.png';">
          <span class="sr-only">Arena</span>
        </button>
        <button type="button" class="bottom-menu-btn" data-page="alliance" data-tooltip="Alliance" onclick="navigate('alliance')">
          <img class="bottom-menu-icon" src="Assets/UI/alliance.png" alt="Alliance icon" onerror="this.onerror=null;this.src='Assets/UI/default-menu.png';">
          <span class="sr-only">Alliance</span>
        </button>
        <button type="button" class="bottom-menu-btn" data-page="market" data-tooltip="Market" onclick="navigate('market')">
          <img class="bottom-menu-icon" src="Assets/UI/market.png" alt="Market icon" onerror="this.onerror=null;this.src='Assets/UI/default-menu.png';">
          <span class="sr-only">Market</span>
        </button>
      </nav>
      <div class="bottom-menu-tools">
        <button type="button" id="editModeToggle" class="bottom-menu-btn bottom-menu-btn--tool" data-tooltip="Edit Mode" aria-pressed="false" title="When on, drag and resize editable scene objects, add or remove them. Layout is saved.">
          <img class="bottom-menu-icon" src="Assets/UI/edit.png" alt="Edit mode icon" onerror="this.onerror=null;this.src='Assets/UI/default-menu.png';">
          <span class="sr-only">Edit mode</span>
        </button>
        <div id="editModeAddPanel" class="sidebar-add-panel hidden">
          <button type="button" id="editModeAddBtn" class="sidebar-add-btn">Add object…</button>
          <div id="editModeAddList" class="sidebar-add-list hidden" role="listbox" aria-label="Add editable object"></div>
        </div>
      </div>
      <select id="themeSelect" class="theme-select hidden" aria-hidden="true" tabindex="-1" aria-label="Game theme">
        <option value="medieval">Medieval</option>
        <option value="scifi">Sci‑Fi</option>
      </select>
    </div>
    <div class="bottom-hud-minimap" id="bottomHudMinimapSlot" aria-label="Minimap"></div>
  </section>
</div>

<div id="fightOverlay" class="fight-overlay hidden" aria-live="polite">
  <div class="fight-panel fight-panel--turn">
    <h3 class="fight-title">Combat</h3>
    <div class="fight-body">
      <div class="fight-main-column">
        <div id="fightHud" class="fight-hud"></div>
        <div id="fightPlayerActions" class="fight-player-actions hidden"></div>
        <div class="fight-actions">
          <button type="button" id="fightCloseBtn" class="btn-primary btn-fight-close hidden">Close</button>
        </div>
      </div>
      <aside class="fight-side-column">
        <div class="fight-log-section">
          <span class="fight-section-label">Combat log</span>
          <div id="fightLog" class="fight-log"></div>
        </div>
        <div id="fightResults" class="fight-results hidden" aria-live="polite"></div>
      </aside>
    </div>
  </div>
</div>

<div id="itemTooltip" class="item-tooltip hidden" role="tooltip" aria-hidden="true"></div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div id="modalContent"></div>
    <button type="button" onclick="closeModal()">Close</button>
  </div>
</div>

<div id="worldMapModal" class="world-map-modal hidden" aria-hidden="true" role="dialog" aria-labelledby="worldMapModalTitle">
  <div class="world-map-modal-panel">
    <header class="world-map-modal-head">
      <h2 id="worldMapModalTitle" class="world-map-modal-title">World map</h2>
      <div class="world-map-modal-head-actions">
        <div class="world-map-modal-zoom" role="group" aria-label="Map zoom">
          <button type="button" class="world-map-zoom-btn" id="worldMapZoomOut" title="Zoom out" aria-label="Zoom out">−</button>
          <span class="world-map-zoom-value" id="worldMapZoomValue" aria-live="polite">—</span>
          <button type="button" class="world-map-zoom-btn" id="worldMapZoomIn" title="Zoom in" aria-label="Zoom in">+</button>
        </div>
        <button type="button" class="world-map-modal-close" id="worldMapModalClose" aria-label="Close world map">Close</button>
      </div>
    </header>
    <p class="world-map-modal-hint">Scroll wheel or +/−: zoom. Drag: pan.</p>
    <div class="world-map-modal-scroll" id="worldMapModalScroll">
      <div class="world-map-modal-canvas-wrap" id="worldMapModalCanvasWrap">
        <canvas id="worldMapCanvas" class="world-map-canvas" width="1" height="1" aria-label="World map"></canvas>
      </div>
    </div>
  </div>
</div>

<div id="characterPanelModal" class="character-panel-modal hidden" aria-hidden="true" role="dialog" aria-labelledby="characterPanelTitle">
  <div class="character-panel-shell">
    <header class="character-panel-head">
      <h2 id="characterPanelTitle" class="character-panel-title">Character</h2>
      <button type="button" id="characterPanelClose" class="character-panel-close" aria-label="Close character panel">Close</button>
    </header>
    <div id="characterPanelContent" class="character-panel-content"></div>
  </div>
</div>

<script src="world_map_data.js"></script>
<script src="config.js"></script>
<script src="game.js"></script>
</body>
</html>
